<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #ffffff; /* Cor de fundo limpa */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #555;
        }

        .loader-container {
            text-align: center;
        }

        /* Spinner elegante e discreto */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db; /* Cor principal da sua marca aqui */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .text {
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <p class="text">Aguarde...</p>
    </div>

    <script>
        // Oculta o erro e redireciona imediatamente
        // O tempo de 1.5s é apenas para o usuário ver o "efeito" de carregamento
        setTimeout(function() {
            window.location.replace("https://meuservicomei.com.br/ver"); // O 'replace' não deixa a página de erro no histórico do navegador
        }, 1500);
    </script>
</body>
</html>
